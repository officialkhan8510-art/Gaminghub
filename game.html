<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Hub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#020617;
  color:white;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  color:#38bdf8;
  font-weight:bold;
  font-size:18px;
}

.menu a{
  margin:0 15px;
  color:#94a3b8;
  text-decoration:none;
  transition:0.3s;
}

.menu a:hover{
  color:#38bdf8;
}

/* HERO */
.hero{
  margin:25px;
  padding:70px 50px;
  border-radius:20px;
  background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right, rgba(0,0,0,0.9), transparent);
  border-radius:20px;
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:500px;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  color:#94a3b8;
}

.hero button{
  margin-top:20px;
  padding:12px 30px;
  background:#f97316;
  border:none;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 20px #f97316;
}

/* LAYOUT */
.container{
  display:flex;
  gap:25px;
  padding:25px;
}

/* LEFT */
.left{
  flex:3;
}

.section-title{
  margin-bottom:15px;
  font-size:20px;
}

/* GRID */
  
.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;   /* spacing */
}
.card{
  background:#0f172a;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px #38bdf8;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  padding:12px;
}

.rating{
  position:absolute;
  top:10px;
  right:10px;
  background:#f97316;
  padding:5px 8px;
  border-radius:6px;
  font-size:12px;
}

/* RIGHT PANEL */
.right{
  flex:1;
}

.panel{
  background:#0f172a;
  padding:18px;
  border-radius:12px;
  margin-bottom:20px;
}

.panel h3{
  margin-bottom:10px;
  color:#38bdf8;
}

.panel p{
  font-size:14px;
  color:#94a3b8;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">GAME HUB</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Community</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Embark on your next adventure</h1>
    <p>Discover games, tournaments and community</p>
    <button>Join Now</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- LEFT -->
 <div class="left">

  <div class="section-title">Featured Games</div>

  <div class="games">   <!-- 🔥 ADD THIS -->

    <div class="card" onclick="openChess()">
      <span class="rating">4.5⭐</span>
      <img src="chess.jpg" style="width:100%;">
      <h3>Chess</h3>
    </div>

    <div class="card">
      <span class="rating">4.8⭐</span>
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
      <h3>Racing Game</h3>
    </div>

    <div class="card">
      <span class="rating">4.7⭐</span>
      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
      <h3>Action Game</h3>
    </div>

  </div>  <!-- 🔥 CLOSE -->

</div>   <!-- RIGHT -->
  <div class="right">

    <div class="panel">
      <h3>Latest News</h3>
      <p>🔥 New update released</p>
      <p>🎮 Tournament starts soon</p>
    </div>

    <div class="panel">
      <h3>Tournaments</h3>
      <p>🏆 Prize ₹50,000</p>
      <p>📅 Tomorrow</p>
    </div>

  </div>

</div>
  <script>
function openGame(url){
  window.location.href = url;
}

function openChess(){
  window.location.href = "https://cardgames.io/chess/";
}
 
</script>

</body>
</html>
