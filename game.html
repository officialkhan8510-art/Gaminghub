<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Hub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#020617;
  color:white;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  color:#38bdf8;
  font-weight:bold;
}

.menu a{
  margin:0 10px;
  color:#94a3b8;
  text-decoration:none;
  transition:0.3s;
}

.menu a:hover{
  color:#38bdf8;
}

/* HERO */
.hero{
  margin:20px;
  padding:50px;
  border-radius:15px;
  background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
  position:relative;
  overflow:hidden;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:35px;
}

.hero button{
  margin-top:15px;
  padding:10px 25px;
  background:orange;
  border:none;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 15px orange;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
  padding:20px;
}

/* LEFT */
.left{
  flex:3;
}

/* GRID */
.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-top:15px;
}

.card{
  background:#0f172a;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 20px #38bdf8;
}

.card img{
  width:100%;
}

.card h3{
  padding:10px;
}

.rating{
  position:absolute;
  top:10px;
  right:10px;
  background:orange;
  padding:5px 8px;
  border-radius:5px;
  font-size:12px;
}

/* RIGHT */
.right{
  flex:1;
}

.panel{
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.panel h3{
  margin-bottom:10px;
  color:#38bdf8;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">GAME HUB</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Community</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Embark on your next adventure</h1>
    <button>Join Now</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2>Featured Games</h2>

    <div class="games">

      <div class="card">
        <span class="rating">4.5⭐</span>
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
        <h3>Battle Game</h3>
      </div>

      <div class="card">
        <span class="rating">4.8⭐</span>
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
        <h3>Racing Game</h3>
      </div>

      <div class="card">
        <span class="rating">4.7⭐</span>
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
        <h3>Action Game</h3>
      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="panel">
      <h3>Latest News</h3>
      <p>🔥 New update released</p>
      <p>🎮 Tournament starting soon</p>
    </div>

    <div class="panel">
      <h3>Upcoming Tournaments</h3>
      <p>🏆 Prize: ₹50,000</p>
      <p>📅 Starts Tomorrow</p>
    </div>

  </div>

</div>

</body>
</html>
