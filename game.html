<!DOCTYPE html>
<html>
<head>
  <title>Shooting Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="game">

<h1>🎯 Shoot the Target</h1>
<p>Score: <span id="score">0</span></p>

<canvas id="gameCanvas" width="400" height="400"></canvas>
<style>body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
}

/* HOME */
.home {
  background: radial-gradient(circle, #111, #000);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.title {
  font-size: 50px;
  color: orange;
  text-shadow: 0 0 20px orange;
}

button {
  padding: 12px 25px;
  background: linear-gradient(45deg, orange, red);
  border: none;
  color: white;
  cursor: pointer;
  margin-top: 20px;
}

/* GAME */
.game {
  background: black;
}

canvas {
  background: #111;
  border: 2px solid red;
  margin-top: 20px;
}
  </style>

<script> const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getcontext("2d");

let score = 0;
let target = { x: 200, y: 200, r: 20 };

// draw target
function drawTarget() {
  ctx.clearRect(0,0,400,400);

  ctx.beginPath();
  ctx.arc(target.x, target.y, target.r, 0, Math.PI * 2);
  ctx.fillStyle = "red";
  ctx.fill();
}

// random position
function newTarget(){
  target.x = Math.random()*360 + 20;
  target.y = Math.random()*360 + 20;
}

// click shoot
canvas.addEventListener("click", function(e){
  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  let dist = Math.sqrt((x-target.x)**2 + (y-target.y)**2);

  if(dist < target.r){
    score++;
    document.getElementById("score").innerText = score;
    newTarget();
  }
});

setInterval(drawTarget, 50);
</script>

</body>
</html>
