<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🐍 Snake Game</h1>

<canvas id="gameCanvas"></canvas>

<!-- Mobile Controls -->
<div class="controls">
  <button onclick="setDirection('up')">⬆️</button><br>
  <button onclick="setDirection('left')">⬅️</button>
  <button onclick="setDirection('down')">⬇️</button>
  <button onclick="setDirection('right')">➡️</button>
</div>
  <style>body {
  text-align: center;
  background: black;
  color: white;
  font-family: Arial;
}

canvas {
  background: black;
  border: 2px solid cyan;
  width: 90vw;      /* responsive */
  max-width: 400px; /* laptop */
  height: 90vw;
  max-height: 400px;
}

/* Mobile buttons */
.controls {
  margin-top: 20px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  font-size: 20px;
  background: cyan;
  border: none;
  border-radius: 5px;
}
    </style>

<script> const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// responsive canvas fix
canvas.width = 400;
canvas.height = 400;

let box = 20;
let snake = [{x: 200, y: 200}];
let dx = box;
let dy = 0;

let food = {
  x: Math.floor(Math.random() * 20) * box,
  y: Math.floor(Math.random() * 20) * box
};

// PC controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -box; }
  if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = box; }
  if (e.key === "ArrowLeft" && dx === 0) { dx = -box; dy = 0; }
  if (e.key === "ArrowRight" && dx === 0) { dx = box; dy = 0; }
});

// Mobile controls
function setDirection(dir) {
  if (dir === "up" && dy === 0) { dx = 0; dy = -box; }
  if (dir === "down" && dy === 0) { dx = 0; dy = box; }
  if (dir === "left" && dx === 0) { dx = -box; dy = 0; }
  if (dir === "right" && dx === 0) { dx = box; dy = 0; }
}

function drawGame() {
  ctx.clearRect(0, 0, 400, 400);

  let head = {x: snake[0].x + dx, y: snake[0].y + dy};

  // Game Over
  if (
    head.x < 0 || head.y < 0 ||
    head.x >= 400 || head.y >= 400 ||
    snake.some(s => s.x === head.x && s.y === head.y)
  ) {
    alert("Game Over 😢");
    snake = [{x: 200, y: 200}];
    dx = box;
    dy = 0;
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    food = {
      x: Math.floor(Math.random() * 20) * box,
      y: Math.floor(Math.random() * 20) * box
    };
  } else {
    snake.pop();
  }

  // Snake
  ctx.fillStyle = "lime";
  snake.forEach(p => ctx.fillRect(p.x, p.y, box, box));

  // Food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);
}

setInterval(drawGame, 120);
</script>

</body>
</html>
