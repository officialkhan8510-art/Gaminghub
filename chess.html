<!DOCTYPE html>
<html>
<head>
<title>Chess Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#020617;
  color:white;
  text-align:center;
  font-family:Arial;
}

.board{
  display:grid;
  grid-template-columns:repeat(8,50px);
  justify-content:center;
  margin-top:30px;
}

.cell{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
}

.white{ background:#eee; }
.black{ background:#555; color:white; }

.selected{
  outline:3px solid yellow;
}
  .white-piece {
  color: white;
}

.black-piece {
  color: black;
}
  .white-piece {
  color: #ffffff;
}

.black-piece {
  color: #000000;
}
  .highlight {
  outline: 3px solid yellow;
}
</style>
</head>

<body>

<h2>вҷҹ Chess (Basic Working)</h2>
  
<h3 id="turn">Turn: white</h3>
<button onclick="resetGame()">Reset</button>
<div class="board" id="board"></div>
  
let validMoves = [];
  
<script>
let pieces = [
  "вҷң","вҷһ","вҷқ","вҷӣ","вҷҡ","вҷқ","вҷһ","вҷң",
  "вҷҹ","вҷҹ","вҷҹ","вҷҹ","вҷҹ","вҷҹ","вҷҹ","вҷҹ",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "вҷҷ","вҷҷ","вҷҷ","вҷҷ","вҷҷ","вҷҷ","вҷҷ","вҷҷ",
  "вҷ–","вҷҳ","вҷ—","вҷ•","вҷ”","вҷ—","вҷҳ","вҷ–"
];

const board = document.getElementById("board");
let selected = null;
let turn = "white";

function isWhite(piece){
  return "вҷҷвҷ–вҷҳвҷ—вҷ•вҷ”".includes(piece);
}

function isBlack(piece){
  return "вҷҹвҷңвҷһвҷқвҷӣвҷҡ".includes(piece);
}

function renderBoard(){
  board.innerHTML="";

  pieces.forEach((p,i)=>{
    const cell=document.createElement("div");
    cell.classList.add("cell");

    if((Math.floor(i/8)+i%8)%2==0){
      cell.classList.add("white");
    }else{
      cell.classList.add("black");
    }

    cell.textContent = p;

if("вҷҷвҷ–вҷҳвҷ—вҷ•вҷ”".includes(p)){
  cell.classList.add("white-piece");
}

if("вҷҹвҷңвҷһвҷқвҷӣвҷҡ".includes(p)){
  cell.classList.add("black-piece");
}

   cell.onclick = () => {

  // FIRST CLICK (select piece)
  if(selected === null){

    if(p === "") return;

    selected = i;
    validMoves = getMoves(i);

    renderBoard();

    validMoves.forEach(m => {
      board.children[m].classList.add("highlight");
    });

  }

  // SECOND CLICK (move)
  else {

    // sirf allowed move pe hi chalega
    if(validMoves.includes(i)){
      pieces[i] = pieces[selected];
      pieces[selected] = "";
    }

    selected = null;
    validMoves = [];
    renderBoard();
  }

};
  board.appendChild(cell);
  });

  document.getElementById("turn").innerText = "Turn: " + turn;
}

function resetGame(){
  location.reload();
}

renderBoard();

  function getMoves(index){
  let moves = [];

  // simple forward moves (pawn type logic demo)
  let row = Math.floor(index / 8);
  let col = index % 8;

  // upar
  if(row > 0) moves.push(index - 8);

  // niche
  if(row < 7) moves.push(index + 8);

  // left
  if(col > 0) moves.push(index - 1);

  // right
  if(col < 7) moves.push(index + 1);

  return moves;
}
</script>

</body>
</html>
