<!DOCTYPE html>
<html>
<head>
<title>Chess Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#020617;
  color:white;
  text-align:center;
  font-family:Arial;
}

.board{
  display:grid;
  grid-template-columns:repeat(8,50px);
  justify-content:center;
  margin-top:30px;
}

.cell{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
}

.white{ background:#eee; }
.black{ background:#555; color:white; }

.selected{
  outline:3px solid yellow;
}
</style>
</head>

<body>

<h2>♟ Chess (Basic Working)</h2>

<div class="board" id="board"></div>

<script>
const pieces = [
  "♜","♞","♝","♛","♚","♝","♞","♜",
  "♟","♟","♟","♟","♟","♟","♟","♟",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "♙","♙","♙","♙","♙","♙","♙","♙",
  "♖","♘","♗","♕","♔","♗","♘","♖"
];

const board = document.getElementById("board");
let selected = null;

function renderBoard(){
  board.innerHTML="";
  pieces.forEach((p,i)=>{
    const cell=document.createElement("div");
    cell.classList.add("cell");

    if((Math.floor(i/8)+i%8)%2==0){
      cell.classList.add("white");
    }else{
      cell.classList.add("black");
    }

    cell.textContent=p;

    cell.onclick=()=>{
      if(selected===null){
        selected=i;
        cell.classList.add("selected");
      }else{
        pieces[i]=pieces[selected];
        pieces[selected]="";
        selected=null;
        renderBoard();
      }
    };

    board.appendChild(cell);
  });
}

renderBoard();
</script>

</body>
</html>
