<!DOCTYPE html>
<html>
<head>
<title>Chess Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#020617;
  color:white;
  text-align:center;
  font-family:Arial;
}

.board{
  display:grid;
  grid-template-columns:repeat(8,50px);
  justify-content:center;
  margin-top:30px;
}

.cell{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
}

.white{ background:#eee; }
.black{ background:#555; color:white; }

.selected{
  outline:3px solid yellow;
}
</style>
</head>

<body>

<h2>♟ Chess (Basic Working)</h2>
  
<h3 id="turn">Turn: white</h3>
<button onclick="resetGame()">Reset</button>
<div class="board" id="board"></div>

<script>
let pieces = [
  "♜","♞","♝","♛","♚","♝","♞","♜",
  "♟","♟","♟","♟","♟","♟","♟","♟",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "♙","♙","♙","♙","♙","♙","♙","♙",
  "♖","♘","♗","♕","♔","♗","♘","♖"
];

const board = document.getElementById("board");
let selected = null;
let turn = "white";

function isWhite(piece){
  return "♙♖♘♗♕♔".includes(piece);
}

function isBlack(piece){
  return "♟♜♞♝♛♚".includes(piece);
}

function renderBoard(){
  board.innerHTML="";

  pieces.forEach((p,i)=>{
    const cell=document.createElement("div");
    cell.classList.add("cell");

    if((Math.floor(i/8)+i%8)%2==0){
      cell.classList.add("white");
    }else{
      cell.classList.add("black");
    }

    cell.textContent=p;

    cell.onclick=()=>{
      if(selected===null){
        if(p==="") return;

        if(turn==="white" && !isWhite(p)) return;
        if(turn==="black" && !isBlack(p)) return;

        selected=i;
        cell.classList.add("selected");
      }else{
        pieces[i]=pieces[selected];
        pieces[selected]="";

        turn = (turn==="white") ? "black" : "white";

        selected=null;
        renderBoard();
      }
    };

    board.appendChild(cell);
  });

  document.getElementById("turn").innerText = "Turn: " + turn;
}

function resetGame(){
  location.reload();
}

renderBoard();
</script>

</body>
</html>
