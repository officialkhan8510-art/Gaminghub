<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0b1120;
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #020617;
}

.logo {
  color: #38bdf8;
  font-weight: bold;
}

.menu a {
  margin: 0 10px;
  color: #94a3b8;
  text-decoration: none;
}

/* HERO */
.hero {
  margin: 20px;
  padding: 40px;
  border-radius: 15px;
  background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
}

.hero h1 {
  font-size: 32px;
}

.hero button {
  margin-top: 10px;
  padding: 10px 20px;
  background: orange;
  border: none;
}

/* MAIN */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* LEFT */
.left {
  flex: 3;
}

/* GRID */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 15px;
}

.card {
  background: #020617;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #38bdf8;
}

.card img {
  width: 100%;
}

.card h3 {
  padding: 10px;
}

/* RIGHT PANEL */
.right {
  flex: 1;
}

.panel {
  background: #020617;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.panel h3 {
  margin-bottom: 10px;
}

/* MOBILE */
@media(max-width: 768px) {
  .container {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">GAME HUB</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Community</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Embark on your next adventure</h1>
  <button>Join Now</button>
</div>

<!-- MAIN -->
<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2>Featured Games</h2>
    <div class="games">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
        <h3>Battle Game</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
        <h3>Racing Game</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
        <h3>Action Game</h3>
      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="panel">
      <h3>Latest News</h3>
      <p>New game released</p>
      <p>Update coming soon</p>
    </div>

    <div class="panel">
      <h3>Tournaments</h3>
      <p>Prize: ₹50,000</p>
      <p>Join now</p>
    </div>

  </div>

</div>

</body>
</html>
