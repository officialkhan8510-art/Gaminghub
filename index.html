<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  color:white;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#38bdf8;
  filter:blur(120px);
  top:-100px;
  left:-100px;
}

/* CONTAINER */
.container{
  text-align:center;
  z-index:2;
  animation:fade 1.2s ease;
}

h1{
  font-size:50px;
  color:#38bdf8;
  text-shadow:0 0 20px #38bdf8;
}

p{
  margin:10px 0 25px;
  color:#94a3b8;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:20px;
  justify-content:center;
}

button{
  padding:12px 25px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

/* PLAY */
.play{
  background:#22c55e;
  color:black;
}

.play:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #22c55e;
}

/* LOGIN */
.login{
  background:transparent;
  border:2px solid #38bdf8;
  color:#38bdf8;
}

.login:hover{
  background:#38bdf8;
  color:black;
  box-shadow:0 0 20px #38bdf8;
}

@keyframes fade{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 GAME HUB</h1>
  <p>Play the best browser games anytime</p>

  <div class="buttons">
    <button class="play" onclick="goGame()">▶ Play</button>
    <button class="login">🔐 Login</button>
  </div>
</div>

<script>
function goGame(){
  window.location.href="game.html";
}
</script>

</body>
</html>
