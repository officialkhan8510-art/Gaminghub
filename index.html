<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(2,6,23,0.7);
}

/* CONTENT */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  color: white;
  animation: fade 1.5s ease;
}

h1 {
  font-size: 50px;
  color: #38bdf8;
  text-shadow: 0 0 20px #38bdf8;
}

p {
  margin: 10px 0 20px;
  color: #94a3b8;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 20px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.play {
  background: #22c55e;
}

.login {
  background: transparent;
  border: 2px solid #38bdf8;
  color: #38bdf8;
}

button:hover {
  transform: scale(1.1);
}

/* ANIMATION */
@keyframes fade {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-gaming-setup-5176/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
  <h1>🎮 GAME HUB</h1>
  <p>Play the best browser games anytime</p>

  <div class="buttons">
    <button class="play" onclick="goGame()">▶ Play</button>
    <button class="login">🔐 Login</button>
  </div>
</div>

<script>
function goGame() {
  window.location.href = "game.html";
}
</script>

</body>
</html>
