<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<div id="loader">
  <div class="spinner"></div>
  <h2>Loading Game Hub...</h2>
</div>  

<style>
  #loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 0.5s ease;
}

.spinner{
  width:60px;
  height:60px;
  border:5px solid #1e293b;
  border-top:5px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:20px;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

#loader.hide{
  opacity:0;
  pointer-events:none;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:#020617;
}

/* 🔥 SMOOTH LIVE BACKGROUND */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 30%, #0ea5e9, transparent),
             radial-gradient(circle at 70% 70%, #1e3a8a, transparent),
             #020617;
  z-index:-1;
  transition:0.2s;
}

/* 🔥 CENTER SCENE */
.scene{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1000px;
}

/* 🔥 CARD */
.card{
  width:320px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  text-align:center;
  transform-style:preserve-3d;
  transition:0.15s ease;
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

/* 🔥 TEXT */
h1{
  margin-bottom:10px;
}

p{
  color:#aaa;
  margin-bottom:20px;
}

/* 🔥 BUTTON */
.btn{
  padding:12px 20px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.15s;
}

/* PLAY */
.play{
  background:#22c55e;
  color:black;
}

/* LOGIN */
.login{
  background:transparent;
  border:2px solid #38bdf8;
  color:#38bdf8;
}

/* CLICK EFFECT */
.btn:active{
  transform:scale(0.9);
}

/* 🔥 PARTICLES */
.particle{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  opacity:0.4;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="scene">
  <div class="card" id="card">
    <h1>🎮 GAME HUB</h1>
    <p>Play the best games anytime</p>

    <button class="btn play" onclick="startGame()">▶ Play</button>
    <button class="btn login">Login</button>
  </div>
</div>

<script> 
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").classList.add("hide");
  },800); // thoda delay = premium feel
});

/* 🔥 SMOOTH 3D (NO JUMP) */
const card = document.getElementById("card");
const bg = document.getElementById("bg");

let currentX = 0;
let currentY = 0;

document.addEventListener("mousemove",(e)=>{
  let targetX = (window.innerWidth/2 - e.pageX)/30;
  let targetY = (window.innerHeight/2 - e.pageY)/30;

  currentX += (targetX - currentX)*0.1;
  currentY += (targetY - currentY)*0.1;

  card.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;

  bg.style.transform = `translate(${currentX*5}px, ${currentY*5}px)`;
});

/* 🔥 SOUND (PLAY + LOGIN BOTH) */
const clickSound = new Audio("click.mp3");

document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    clickSound.currentTime = 0;
    clickSound.play();
  });
});

/* 🔥 NAVIGATION */
function startGame(){
  setTimeout(()=>{
    window.location.href="game.html";
  },150);
}

/* 🔥 CLEAN FLOAT PARTICLES */
for(let i=0;i<40;i++){
  let p = document.createElement("div");
  p.className="particle";
  p.style.left = Math.random()*100+"%";
  p.style.top = Math.random()*100+"%";
  document.body.appendChild(p);
}
</script>

</body>
</html>
