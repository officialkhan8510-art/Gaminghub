<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME HUB</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:radial-gradient(circle,#0ea5e9,#020617);
}

/* BACKGROUND DEPTH */
.bg{
  position:absolute;
  width:200%;
  height:200%;
  z-index:-1;
}

/* SCENE */
.scene{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1200px;
}

/* CARD */
.card{
  width:90%;
  max-width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  text-align:center;
  transform-style:preserve-3d;
  transition:0.2s;
  box-shadow:0 30px 60px rgba(0,0,0,0.7);
}

/* LAYERS */
.layer{
  transition:0.2s;
}

/* TITLE */
h1{
  font-size:32px;
  margin-bottom:10px;
}

/* TEXT */
p{
  color:#ccc;
  margin-bottom:25px;
}

/* BUTTON */
.btn{
  padding:14px 25px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.2s;
}

/* PLAY */
.play{
  background:#22c55e;
  color:black;
  box-shadow:0 5px 0 #15803d;
}

/* LOGIN */
.login{
  background:transparent;
  border:2px solid #38bdf8;
  color:#38bdf8;
}

/* CLICK PRESS */
.btn:active{
  transform:scale(0.9) translateY(5px);
}

/* RIPPLE */
.btn span{
  position:absolute;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  transform:scale(0);
  animation:ripple 0.6s linear;
}

@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}

/* FLOAT PARTICLES */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  opacity:0.3;
  border-radius:50%;
  animation:float linear infinite;
}

@keyframes float{
  from{ transform:translateY(100vh); }
  to{ transform:translateY(-10vh); }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="scene">
  <div class="card" id="card">

    <h1 class="layer" data-depth="60">🎮 GAME HUB</h1>
    <p class="layer" data-depth="40">Play the best games anytime</p>

    <button class="btn play layer" data-depth="50" onclick="startGame()">▶ Play</button>
    <button class="btn login layer" data-depth="50">Login</button>

  </div>
</div>

<script>

/* 🔥 3D SYSTEM */
const card = document.getElementById("card");

document.addEventListener("mousemove",(e)=>{
  let x = (window.innerWidth/2 - e.pageX)/25;
  let y = (window.innerHeight/2 - e.pageY)/25;

  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;

  document.querySelectorAll(".layer").forEach(layer=>{
    let depth = layer.getAttribute("data-depth");

    layer.style.transform = `
      translateZ(${depth}px)
      translateX(${x*2}px)
      translateY(${y*2}px)
    `;
  });

  document.querySelector(".bg").style.transform =
    `translate(-${e.pageX/50}px,-${e.pageY/50}px)`;
});

/* 🔥 BUTTON RIPPLE */
document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click",function(e){
    let ripple=document.createElement("span");

    ripple.style.left=e.offsetX+"px";
    ripple.style.top=e.offsetY+"px";

    this.appendChild(ripple);

    setTimeout(()=>ripple.remove(),600);
  });
});

/* 🔥 NAVIGATION */
function startGame(){
  window.location.href="game.html";
}

/* 🔥 PARTICLES */
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}

/* 🔥 SOUND SYSTEM */
const clickSound=new Audio("click.mp3");

document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    clickSound.currentTime=0;
    clickSound.play();
  });
});

</script>

</body>
</html>
