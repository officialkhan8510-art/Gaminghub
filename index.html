<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMER ZONE - Ultimate Gaming Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        body {
            background: linear-gradient(-45deg, #0c0c0c, #1a0033, #000428, #1a0a23);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Stars Background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        /* Gaming Logo */
        .logo {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ff0066, #00ff88, #00ccff, #ffff00, #ff6600);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            animation: logoRainbow 4s ease infinite, logoFloat 6s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(255,255,255,0.8);
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(100px);
        }

        @keyframes logoRainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-30px) rotateX(10deg); }
        }

        /* Tagline */
        .tagline {
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: #00ff88;
            margin-bottom: 4rem;
            text-shadow: 0 0 40px #00ff88;
            animation: pulseGlow 2s infinite;
            opacity: 0;
            transform: translateY(50px);
            letter-spacing: 3px;
        }

        @keyframes pulseGlow {
            0%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 20px #00ff88;
                transform: scale(1);
            }
            50% { 
                opacity: 0.8; 
                text-shadow: 0 0 50px #00ff88;
                transform: scale(1.05);
            }
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 3rem;
            opacity: 0;
            transform: translateY(50px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 20px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: inherit;
            text-decoration: none;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            min-width: 220px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .login-btn {
            background: linear-gradient(145deg, #ff0066, #ff4080);
            color: white;
        }

        .play-btn {
            background: linear-gradient(145deg, #00ff88, #40ffaa);
            color: #000;
            font-weight: 900;
            font-size: 1.5rem;
        }

        .btn:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 25px 50px rgba(0,255,255,0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .buttons {
                flex-direction: column;
                gap: 2rem;
            }
            .btn {
                padding: 18px 40px;
                min-width: 250px;
            }
        }

        /* Neon Grid */
        .grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,255,136,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 2;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="stars" id="stars"></div>
    <div class="grid"></div>

    <!-- Main Content -->
    <div class="container">
        <h1 class="logo">GAMER ZONE</h1>
        <p class="tagline">ENTER THE ULTIMATE GAMING UNIVERSE</p>
        <div class="buttons">
            <button class="btn login-btn" onclick="loginAction()">LOGIN</button>
            <a href="game.html" class="btn play-btn" target="_blank">PLAY NOW</a>
        </div>
    </div>

    <script>
        // Create Stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        // Entrance Animation
        function entranceAnimation() {
            const timeline = [
                { el: '.logo', delay: 500 },
                { el: '.tagline', delay: 1500 },
                { el: '.buttons', delay: 2500 }
            ];

            timeline.forEach(({ el, delay }) => {
                setTimeout(() => {
                    const element = document.querySelector(el);
                    element.style.transition = 'all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    element.style.opacity = '1';
                    element.style.transform = 'translateY(0)';
                }, delay);
            });
        }

        // Button Effects
        function loginAction() {
            const btn = event.target;
            btn.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                btn.style.transform = '';
                alert('🔐 Login Portal\n\nPro Gamer Account Required!\nComing Soon...');
            }, 150);
        }

        // Mouse Trail Effect
        let trail = [];
        document.addEventListener('mousemove', (e) => {
            trail.push({ x: e.clientX, y: e.clientY });
            if (trail.length > 8) trail.shift();
        });

        function drawTrail() {
            trail.forEach((point, index) => {
                const size = 6 - index * 0.8;
                const div = document.createElement('div');
                div.style.position = 'fixed';
                div.style.left = point.x + 'px';
                div.style.top = point.y + 'px';
                div.style.width = size + 'px';
                div.style.height = size + 'px';
                div.style.background = 'radial-gradient(circle, #00ffff, transparent)';
                div.style.borderRadius = '50%';
                div.style.pointerEvents = 'none';
                div.style.zIndex = '100';
                div.style.opacity = (1 - index * 0.15);
                document.body.appendChild(div);
                
                setTimeout(() => div.remove(), 600);
            });
        }

        // Keyboard Easter Egg (Konami Code)
        let konami = [];
        const konamiCode = [38,38,40,40,37,39,37,39,66,65];
        
        document.addEventListener('keydown', (e) => {
            konami.push(e.keyCode);
            konami = konami.slice(-10);
            
            if (konami.join(',') === konamiCode.join(',')) {
                document.body.style.background = 'linear-gradient(45deg, #ff0000, #ffff00, #00ff00)';
                document.querySelector('.logo').innerHTML = 'HACKER MODE <span>ACTIVATED</span>';
                alert('🎮 KONAMI CODE UNLOCKED!\n\nHACKER MODE ACTIVATED!\n\nSecret games unlocked!');
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            createStars();
            entranceAnimation();
            
            // Trail loop
            setInterval(drawTrail, 60);
        });

        // Smooth scroll prevention
        window.addEventListener('scroll', () => {
            window.scrollTo(0, 0);
        }, true);
    </script>
</body>
</html>
