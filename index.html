<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenthos Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #0f172a;
  border-bottom: 1px solid #1e293b;
}

.logo {
  color: #38bdf8;
  font-weight: bold;
  font-size: 20px;
}

.menu a {
  margin: 0 10px;
  color: #94a3b8;
  text-decoration: none;
}

.menu a:hover {
  color: #38bdf8;
}

.auth button {
  margin-left: 10px;
  padding: 6px 12px;
  border: none;
  cursor: pointer;
}

.login {
  background: transparent;
  border: 1px solid #38bdf8;
  color: #38bdf8;
}

.register {
  background: #38bdf8;
  color: black;
}

/* HERO */
.hero {
  margin: 20px;
  padding: 40px;
  border-radius: 12px;
  background: linear-gradient(90deg, #1e293b, #0f172a);
  border: 1px solid #38bdf8;
}

.hero h1 {
  font-size: 28px;
}

.hero button {
  margin-top: 10px;
  padding: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
}

.sidebar h3 {
  margin-bottom: 10px;
}

.sidebar p {
  color: #94a3b8;
  font-size: 14px;
}

/* GAMES GRID */
.games {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  border-radius: 10px;
  padding: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  border: 1px solid #38bdf8;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card h4 {
  margin: 10px 0 5px;
}

.card button {
  background: #22c55e;
  border: none;
  padding: 6px;
  width: 100%;
  cursor: pointer;
}

/* MOBILE */
@media(max-width: 768px) {
  .container {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">ZENTHOS</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">News</a>
    <a href="#">Tournaments</a>
    <a href="#">Community</a>
  </div>
  <div class="auth">
    <button class="login">Login</button>
    <button class="register">Register</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>🔥 Latest: Dominate the Gaming World</h1>
  <button>Play Now</button>
</div>

<!-- MAIN -->
<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Featured</h3>
    <p>Valorant Masters</p>
    <p>LoL Worlds</p>

    <h3>Community</h3>
    <p>Active Topics</p>
    <p>User Screenshots</p>
  </div>

  <!-- GAMES -->
  <div class="games">
    <div class="card">
      <img src="https://picsum.photos/200/120?1">
      <h4>Elden Ring</h4>
      <button>Play</button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/200/120?2">
      <h4>Apex Legends</h4>
      <button>Play</button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/200/120?3">
      <h4>Forza</h4>
      <button>Play</button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/200/120?4">
      <h4>Battle Game</h4>
      <button>Play</button>
    </div>

  </div>

</div>

</body>
</html>
