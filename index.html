<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMER ZONE 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', Arial, sans-serif;
            overflow-x: hidden;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        /* 🔥 GAMING BACKGROUNDS 🔥 */
        .gaming-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* 1. CYBERPUNK CITY */
        .cyberpunk {
            background: 
                radial-gradient(ellipse at 30% 20%, #ff00ff40 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, #00ff0040 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, #00ffff40 0%, transparent 50%),
                linear-gradient(45deg, #0a0a0a 0%, #1a0033 30%, #000 100%);
            animation: cyberpunkShift 15s ease infinite;
        }

        @keyframes cyberpunkShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 2. NEON GRID + GLITCH */
        .neon-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,0.1) 2px, rgba(0,255,255,0.1) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,0,255,0.1) 2px, rgba(255,0,255,0.1) 4px),
                repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,255,0,0.1) 2px, rgba(0,255,0,0.1) 4px);
            animation: gridMove 20s linear infinite, glitch 2s infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(-25%, -25%) rotate(0deg); }
            100% { transform: translate(0%, 0%) rotate(360deg); }
        }

        @keyframes glitch {
            0%, 95% { transform: translate(0); }
            97% { transform: translate(-2px, 2px); }
            99% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* 3. PARTICLE EXPLOSION */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 3s infinite;
        }

        @keyframes explode {
            0% {
                transform: scale(0) translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: scale(1) translate(var(--x), var(--y));
                opacity: 0;
            }
        }

        /* 4. SCAN LINES */
        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,255,255,0.03) 2px,
                    rgba(0,255,255,0.03) 4px
                );
            animation: scan 0.1s linear infinite;
        }

        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 4px; }
        }

        /* 5. GAMING LOGOS FLOATING */
        .game-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .game-logo {
            position: absolute;
            font-size: clamp(2rem, 5vw, 4rem);
            animation: floatGame 8s ease-in-out infinite;
            text-shadow: 0 0 20px currentColor;
            filter: drop-shadow(0 0 10px currentColor);
        }

        @keyframes floatGame {
            0%, 100% { 
                transform: translateY(0) rotate(0deg) scale(1); 
                opacity: 0.3;
            }
            25% { 
                transform: translateY(-30px) rotate(90deg) scale(1.2); 
                opacity: 0.8;
            }
            50% { 
                transform: translateY(-60px) rotate(180deg) scale(1.5); 
                opacity: 1;
            }
            75% { 
                transform: translateY(-30px) rotate(270deg) scale(1.2); 
                opacity: 0.8;
            }
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 3rem;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 2px solid #00ffff;
            box-shadow: 0 0 30px #00ffff50;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff0000, #ff8800, #00ff00, #00ffff, #ff00ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px #00ffff;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
        }

        .hero h1 {
            font-size: clamp(4rem, 12vw, 8rem);
            margin-bottom: 2rem;
            background: linear-gradient(45deg, #ff0040, #00ff80, #0080ff, #ff8000);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 2s ease-in-out infinite alternate;
            text-shadow: 
                0 0 20px #ff0040,
                0 0 40px #00ff80,
                0 0 60px #0080ff;
            filter: drop-shadow(0 0 20px #00ffff);
        }

        @keyframes titleGlow {
            from { 
                filter: hue-rotate(0deg) drop-shadow(0 0 20px #ff0040);
            }
            to { 
                filter: hue-rotate(120deg) drop-shadow(0 0 40px #00ff80);
            }
        }

        .hero p {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 4rem;
            opacity: 0.95;
            max-width: 800px;
            text-shadow: 0 0 20px #00ffff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 1; }
        }

        /* BUTTONS */
        .cta-buttons {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 1.5rem 3rem;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff0040, #ff4080);
            color: white;
            box-shadow: 0 10px 30px rgba(255,0,64,0.5);
        }

        .btn-primary:hover {
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 20px 50px rgba(255,0,64,0.8);
            background: linear-gradient(45deg, #ff4080, #ff0040);
        }

        .btn-secondary {
            background: transparent;
            color: #00ffff;
            border: 3px solid #00ffff;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(0,255,255,0.2);
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,255,255,0.5);
        }
        
/* 🔥 3D BUTTON UPGRADE */
.btn {
    transform-style: preserve-3d;
    perspective: 800px;
}

.btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    transform: translateZ(-20px);
}

/* 3D HOVER */
.btn:hover {
    transform: rotateX(10deg) rotateY(-10deg) scale(1.1) translateY(-10px);
}

/* CLICK DEPTH */
.btn:active {
    transform: translateY(5px) scale(0.95);
}
        /* STATS */
        .stats {
            padding: 8rem 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stat-card {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 2px solid rgba(0,255,255,0.3);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        .stat-card:hover::before {
            animation: shine 0.6s ease forwards;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }

        .stat-card:hover {
            transform: translateY(-20px) scale(1.05);
            border-color: #ff0040;
            box-shadow: 0 30px 60px rgba(0,255,255,0.4);
        }

        .stat-number {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ffff, #ff0040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px #00ffff;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header { padding: 1rem 1.5rem; }
            .cta-buttons { flex-direction: column; align-items: center; gap: 1rem; }
            .stats { padding: 4rem 1.5rem; grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 🔥 FULL GAMING BACKGROUNDS 🔥 -->
    <div class="gaming-bg cyberpunk">
        <div class="neon-grid"></div>
        <div class="particles" id="particles"></div>
        <div class="scanlines"></div>
        <div class="game-icons" id="gameIcons"></div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="logo">GAMER ZONE</div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h1>LEVEL UP OR LOG OUT</h1>
        <p>50K+ Gamers • 24/7 Tournaments • $100K Prize Pool • Become Legendary</p>
        <div class="cta-buttons">
            <button class="startgame">START BATTLE</button>
            <button class="btn btn-secondary">JOIN TOURNAMENT</button>
        </div>
    </section>

    <!-- STATS -->
    <section class="stats">
        <div class="stat-card">
            <div class="stat-number">50K+</div>
            <h3>ACTIVE GAMERS</h3>
        </div>
        <div class="stat-card">
            <div class="stat-number">1K+</div>
            <h3>DAILY MATCHES</h3>
        </div>
        <div class="stat-card">
            <div class="stat-number">$100K</div>
            <h3>PRIZE POOL</h3>
        </div>
        <div class="stat-card">
            <div class="stat-number">24/7</div>
            <h3>LIVE ACTION</h3>
        </div>
    </section>

    <script>
        // 🔥 PARTICLE EXPLOSION SYSTEM 🔥
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const colors = ['#ff0040', '#00ff80', '#0080ff', '#ff8000', '#ff00ff', '#00ffff'];

            setInterval(() => {
                for(let i = 0; i < 15; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.setProperty('--x', (Math.random() - 0.5) * 200 + 'px');
                    particle.style.setProperty('--y', (Math.random() - 0.5) * 200 + 'px');
                    particle.style.animationDuration = (Math.random() * 2 + 1) + 's';
                    particlesContainer.appendChild(particle);

                    setTimeout(() => particle.remove(), 3000);
                }
            }, 500);
        }

        // 🔥 FLOATING GAME LOGOS 🔥
        function createGameIcons() {
            const iconsContainer = document.getElementById('gameIcons');
            const gameEmojis = ['🎮', '⚔️', '💥', '🔫', '🎯', '👾', '🕹️', '⭐', '🌟', '💎'];
            
            gameEmojis.forEach((emoji, index) => {
                const icon = document.createElement('div');
                icon.className = 'game-logo';
                icon.textContent = emoji;
                icon.style.left = Math.random() * 80 + '%';
                icon.style.top = Math.random() * 80 + '%';
                icon.style.animationDelay = index * 0.5 + 's';
                icon.style.animationDuration = (6 + Math.random() * 4) + 's';
                iconsContainer.appendChild(icon);
            });
        }

        // 🔥 START ALL ANIMATIONS 🔥
        createParticles();
        createGameIcons();

        // 🔥 MOUSE TRAIL EFFECT 🔥
        document.addEventListener('mousemove', (e) => {
            const trail = document.createElement('div');
            trail.style.position = 'fixed';
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            trail.style.width = '6px';
            trail.style.height = '6px';
            trail.style.background = 'radial-gradient(circle, #00ffff, transparent)';
            trail.style.borderRadius = '50%';
            trail.style.pointerEvents = 'none';
            trail.style.zIndex = '9999';
            trail.style.animation = 'explode 0.6s forwards';
            document.body.appendChild(trail);
            
            setTimeout(() => trail.remove(), 600);
        });
    </script>
</body>
</html>
