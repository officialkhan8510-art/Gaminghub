<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.logo { color: #38bdf8; font-weight: bold; }

.menu a {
  margin: 0 10px;
  color: #94a3b8;
  text-decoration: none;
}

.auth button {
  margin-left: 10px;
  padding: 6px 12px;
  border: none;
}

.login { border: 1px solid #38bdf8; color: #38bdf8; background: transparent; }
.register { background: #38bdf8; color: black; }

/* SLIDER */
.slider {
  position: relative;
  margin: 20px;
  height: 220px;
  overflow: hidden;
  border-radius: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: 0.5s;
}

.active { opacity: 1; }

/* GLOW OVERLAY */
.slide::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.7), transparent);
}

/* TEXT */
.slide-content {
  position: absolute;
  z-index: 2;
  padding: 20px;
}

.slide h2 { color: #38bdf8; }

.slide button {
  padding: 8px 15px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  padding: 10px;
  cursor: pointer;
}

.left { left: 10px; }
.right { right: 10px; }

/* GAMES GRID */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #0f172a;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #38bdf8;
}

.card img {
  width: 100%;
}

.card h3 {
  padding: 10px;
}

.card button {
  margin: 10px;
  padding: 6px;
  background: #22c55e;
  border: none;
  width: calc(100% - 20px);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">ZENTHOS</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">News</a>
    <a href="#">Community</a>
  </div>
  <div class="auth">
    <button class="login">Login</button>
    <button class="register">Register</button>
  </div>
</div>

<!-- SLIDER -->
<div class="slider">

  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1605902711622-cfb43c4437b1')">
    <div class="slide-content">
      <h2> Chess </h2>
      <button onclick="openGame( chess.html)">Play</button>
    </div>
  </div>

  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1542751371-adc38448a05e')">
    <div class="slide-content">
      <h2> Dr. driver </h2>
      <button onclick="openGame( car.html')">Play</button>
    </div>
  </div>

  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420')">
    <div class="slide-content">
      <h2> snake </h2>
      <button onclick="openGame( snake.html)">Play</button>

    </div>
  </div>

  <div class="arrow left" onclick="prev()">◀</div>
  <div class="arrow right" onclick="next()">▶</div>

</div>

<!-- GAMES -->
<div class="games">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
    <h3>Chess </h3>
    <button onclick="openGame( chess.html)">Play</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
    <h3>Dr.driver </h3>
    <button onclick="openGame( car.html)">Play</button>
  </div>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next() {
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prev() {
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}

setInterval(next, 3000);
</script>

</body>
</html>
