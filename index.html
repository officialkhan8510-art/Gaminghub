<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGamer Hub - Epic Gaming Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(45deg, #0a0a0a, #1a0033, #000);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            position: relative;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Particles Canvas */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        /* 3D Logo */
        .logo {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff6600);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 30px #ff00ff,
                0 0 60px #00ffff,
                0 0 90px #ffff00;
            animation: logoGlow 3s ease-in-out infinite alternate, logoFloat 6s ease-in-out infinite;
            transform-style: preserve-3d;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(50px);
        }

        @keyframes logoGlow {
            0% { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(360deg) brightness(1.3); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(5deg); }
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            color: #00ff88;
            text-shadow: 0 0 25px #00ff88;
            margin-bottom: 4rem;
            animation: pulse 2s infinite;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* Buttons Container */
        .btn-group {
            display: flex;
            gap: 2rem;
            opacity: 0;
            transform: translateY(30px);
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 3D Buttons */
        .btn {
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            display: inline-block;
            overflow: hidden;
            min-width: 200px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
            z-index: 1;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Login Button */
        .login-btn {
            background: linear-gradient(145deg, #ff0040, #ff4080);
            color: white;
            box-shadow: 
                0 15px 35px rgba(255,0,64,0.4),
                0 5px 15px rgba(0,0,0,0.3),
                inset 0 5px 10px rgba(255,255,255,0.2);
        }

        .login-btn:hover, .login-btn:focus {
            transform: translateY(-12px) rotateX(10deg) rotateY(10deg);
            box-shadow: 
                0 25px 50px rgba(255,0,64,0.6),
                0 10px 25px rgba(0,0,0,0.4),
                inset 0 5px 10px rgba(255,255,255,0.3);
        }

        /* Start Button */
        .start-btn {
            background: linear-gradient(145deg, #00ff88, #40ffaa);
            color: #000;
            box-shadow: 
                0 15px 35px rgba(0,255,136,0.4),
                0 5px 15px rgba(0,0,0,0.3),
                inset 0 5px 10px rgba(255,255,255,0.4);
            font-weight: 900;
        }

        .start-btn:hover, .start-btn:focus {
            transform: translateY(-12px) rotateX(10deg) rotateY(10deg) scale(1.05);
            box-shadow: 
                0 30px 60px rgba(0,255,136,0.7),
                0 15px 30px rgba(0,0,0,0.4),
                inset 0 5px 10px rgba(255,255,255,0.5);
        }

        /* Floating Cubes */
        .floating-cube {
            position: fixed;
            width: 80px;
            height: 80px;
            transform-style: preserve-3d;
            z-index: 5;
            pointer-events: none;
        }

        .cube-face {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(0,255,255,0.2));
            border: 2px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .cube-face:nth-child(1) { transform: rotateY(0deg) translateZ(40px); }
        .cube-face:nth-child(2) { transform: rotateY(90deg) translateZ(40px); }
        .cube-face:nth-child(3) { transform: rotateY(180deg) translateZ(40px); }
        .cube-face:nth-child(4) { transform: rotateY(270deg) translateZ(40px); }
        .cube-face:nth-child(5) { transform: rotateX(90deg) translateZ(40px); }
        .cube-face:nth-child(6) { transform: rotateX(-90deg) translateZ(40px); }

        /* Responsive */
        @media (max-width: 768px) {
            .btn-group {
                flex-direction: column;
                gap: 1.5rem;
            }
            .btn {
                padding: 16px 30px;
                font-size: 1.1rem;
                min-width: 250px;
            }
        }

        @media (max-width: 480px) {
            .btn {
                min-width: 220px;
                padding: 14px 25px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles Canvas -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Floating 3D Cubes -->
    <div class="floating-cube" id="cube1" style="top: 15%; left: 10%;">
        <div class="cube-face"></div><div class="cube-face"></div><div class="cube-face"></div>
        <div class="cube-face"></div><div class="cube-face"></div><div class="cube-face"></div>
    </div>
    <div class="floating-cube" id="cube2" style="top: 70%; right: 10%;">
        <div class="cube-face"></div><div class="cube-face"></div><div class="cube-face"></div>
        <div class="cube-face"></div><div class="cube-face"></div><div class="cube-face"></div>
    </div>
    <div class="floating-cube" id="cube3" style="bottom: 20%; left: 75%;">
        <div class="cube-face"></div><div class="cube-face"></div><div class="cube-face"></div>
        <div class="cube-face"></div><div class="cube-face"></div><div class="cube-face"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1 class="logo">PROGAMER</h1>
        <p class="subtitle">Ultimate Gaming Universe Awaits</p>
        <div class="btn-group">
            <a href="#login" class="btn login-btn">LOGIN</a>
            <a href="#play" class="btn start-btn">START GAMING</a>
        </div>
    </div>

    <script>
        // Particles System
        class ParticleSystem {
            constructor() {
                this.canvas = document.getElementById('particlesCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                this.particles = [];
                this.init();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            init() {
                for (let i = 0; i < 80; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: this.canvas.height + 50,
                        vx: (Math.random() - 0.5) * 2,
                        vy: -(Math.random() * 3 + 2),
                        size: Math.random() * 3 + 1,
                        opacity: Math.random() * 0.8 + 0.2,
                        hue: Math.random() * 360
                    });
                }
                this.animate();
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.opacity -= 0.01;
                    
                    if (p.y < 0 || p.opacity <= 0) {
                        p.y = this.canvas.height + 50;
                        p.opacity = Math.random() * 0.8 + 0.2;
                        p.x = Math.random() * this.canvas.width;
                    }

                    this.ctx.save();
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.fillStyle = `hsl(${p.hue}, 100%, 50%)`;
                    this.ctx.shadowColor = `hsl(${p.hue}, 100%, 50%)`;
                    this.ctx.shadowBlur = 10;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.restore();
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        // Cube Animations
        class CubeAnimator {
            constructor() {
                this.cubes = document.querySelectorAll('.floating-cube');
                this.animate();
            }

            animate() {
                this.cubes.forEach((cube, index) => {
                    const time = Date.now() * 0.001 + index * 2;
                    cube.style.transform = `
                        rotateX(${time * 50}deg) 
                        rotateY(${time * 30}deg) 
                        translateZ(${Math.sin(time * 2) * 50}px)
                        translateY(${Math.sin(time * 1.5) * 30}px)
                    `;
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // Entrance Animation
        function entranceAnimation() {
            const tl = [
                { el: '.logo', delay: 0.5, duration: 1.2 },
                { el: '.subtitle', delay: 1.2, duration: 1 },
                { el: '.btn-group', delay: 2, duration: 1 }
            ];

            tl.forEach(({ el, delay, duration }) => {
                setTimeout(() => {
                    document.querySelector(el).style.transition = `all ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
                    document.querySelector(el).style.opacity = '1';
                    document.querySelector(el).style.transform = 'translateY(0)';
                }, delay * 1000);
            });
        }

        // Mouse Trail
        let trail = [];
        document.addEventListener('mousemove', (e) => {
            trail.push({ x: e.clientX, y: e.clientY });
            if (trail.length > 5) trail.shift();
        });

        function drawTrail() {
            trail.forEach((point, i) => {
                const div = document.createElement('div');
                div.style.cssText = `
                    position: fixed;
                    left: ${point.x}px;
                    top: ${point.y}px;
                    width: ${5 - i}px;
                    height: ${5 - i}px;
                    background: radial-gradient(circle, #00ffff, transparent);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 1000;
                    opacity: ${1 - i * 0.2};
                `;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 500);
            });
        }

        // Button Click Effects
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Scale animation
                btn.style.transform += ' scale(0.95)';
                setTimeout(() => {
                    btn.style.transform = btn.style.transform.replace(' scale(0.95)', '');
                }, 150);

                // Screen flash
                document.body.style.background = btn.classList.contains('login-btn') 
                    ? 'radial-gradient(circle at center, #ff4080, #0a0a0a)' 
                    : 'radial-gradient(circle at center, #00ff88, #0a0a0a)';
                setTimeout(() => {
                    document.body.style.background = '';
                }, 200);

                // Action
                setTimeout(() => {
                    if (btn.classList.contains('login-btn')) {
                        alert('🔐 Login System\nComing Soon on ProGamer Hub!');
                    } else {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        alert('🎮 Welcome to ProGamer Hub!\nEpic Gaming Experience Loaded!');
                    }
                }, 300);
            });
        });

        // Konami Code
        let konamiCode = [];
        const konami = [38,38,40,40,37,39,37,39,66,65];
        document.addEventListener('keydown', (e) => {
            konamiCode.push(e.keyCode);
            konamiCode = konamiCode.slice(-10);
            if (JSON.stringify(konamiCode) === JSON.stringify(konami)) {
                document.body.style.background = 'linear-gradient(45deg, #ff0000, #ffff00, #00ff00)';
                document.querySelector('.logo').textContent = 'HACKER MODE ✓';
                alert('🎮 KONAMI CODE UNLOCKED!\nHACKER MODE ACTIVATED!');
            }
        });

        // Initialize Everything
        window.addEventListener('load', () => {
            new ParticleSystem();
            new CubeAnimator();
            entranceAnimation();
            
            // Trail loop
            setInterval(drawTrail, 50);
        });

        // Handle Resize
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
