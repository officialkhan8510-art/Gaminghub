<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME HUB</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  overflow:hidden;
}

/* 3D SCENE */
.scene{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1200px;
}

/* CARD */
.card{
  width:90%;
  max-width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  text-align:center;
  transform-style:preserve-3d;
  transition:0.3s;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* TITLE */
h1{
  font-size:32px;
  margin-bottom:10px;
  transform:translateZ(50px);
}

p{
  color:#aaa;
  margin-bottom:30px;
  transform:translateZ(40px);
}

/* BUTTON */
.btn{
  padding:14px 30px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
  transform:translateZ(30px);
}

/* PLAY BUTTON */
.play{
  background:#22c55e;
  color:black;
  box-shadow:0 5px 0 #15803d;
}

/* LOGIN BUTTON */
.login{
  background:transparent;
  color:#38bdf8;
  border:2px solid #38bdf8;
}

/* CLICK ANIMATION */
.btn:active{
  transform:translateY(5px) scale(0.95);
  box-shadow:none;
}

/* FLOATING PARTICLES */
.particle{
  position:absolute;
  width:8px;
  height:8px;
  background:#38bdf8;
  border-radius:50%;
  opacity:0.3;
  animation:float linear infinite;
}

@keyframes float{
  from{ transform:translateY(100vh); }
  to{ transform:translateY(-10vh); }
}
</style>
</head>

<body>

<div class="scene">
  <div class="card" id="card">
    <h1>🎮 GAME HUB</h1>
    <p>Play the best browser games anytime</p>

    <button class="btn play" onclick="startGame()">▶ Play</button>
    <button class="btn login">🔒 Login</button>
  </div>
</div>

<script>

/* 🔥 3D TILT (NO CDN) */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e)=>{
  let x = (window.innerWidth/2 - e.pageX)/20;
  let y = (window.innerHeight/2 - e.pageY)/20;

  card.style.transform = `
    rotateY(${x}deg)
    rotateX(${y}deg)
  `;
});

/* 🔥 BUTTON ACTION */
function startGame(){
  window.location.href = "game.html";
}

/* 🔥 PARTICLES */
for(let i=0;i<30;i++){
  let p = document.createElement("div");
  p.className="particle";
  p.style.left = Math.random()*100+"%";
  p.style.animationDuration = (5+Math.random()*5)+"s";
  document.body.appendChild(p);
}

  
const clickSound = new Audio("click.mp3");
const hoverSound = new Audio("hover.mp3");
const bgMusic = new Audio("bg.mp3");

bgMusic.loop = true;
bgMusic.volume = 0.3;

/* play bg music after first tap (mobile restriction fix) */
document.body.addEventListener("click", ()=>{
  bgMusic.play();
},{once:true});

/* buttons sound */
document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    clickSound.currentTime = 0;
    clickSound.play();
  });

  btn.addEventListener("mouseenter", ()=>{
    hoverSound.currentTime = 0;
    hoverSound.play();
  });
});


</script>

</body>
</html>
