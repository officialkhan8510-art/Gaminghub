<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMER ZONE</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  color:white;
}

/* 🔥 BACKGROUND IMAGE */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:url("bg.jpg") center/cover no-repeat;
  z-index:-2;
}

/* DARK OVERLAY */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* CENTER CONTENT */
.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* 🔥 TITLE */
.title{
  font-size:40px;
  font-weight:bold;
  color:#ff7a18;
  text-shadow:0 0 10px #ff7a18,0 0 20px #ff7a18;
  margin-bottom:20px;
}

/* TEXT */
.info{
  font-size:18px;
  color:#ddd;
  margin-bottom:30px;
  line-height:1.5;
}

/* 🔥 BUTTON BASE */
.btn{
  width:260px;
  padding:15px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

/* RED BUTTON */
.start{
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  box-shadow:0 0 15px #ff416c;
  color:white;
}

/* BLUE BUTTON */
.join{
  background:transparent;
  border:2px solid #22d3ee;
  color:#22d3ee;
  box-shadow:0 0 10px #22d3ee;
}

/* CLICK */
.btn:active{
  transform:scale(0.9);
}

/* 🔥 FLOAT PARTICLES */
.particle{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  opacity:0.4;
  border-radius:50%;
  animation:float linear infinite;
}

@keyframes float{
  from{ transform:translateY(100vh);}
  to{ transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

  <div class="title">GAMER ZONE</div>

  <div class="info">
    👥 50K+ Gamers • 24/7 Tournaments <br>
    💰 $100K Prize Pool • Become Legendary
  </div>

  <button class="btn start" onclick="startGame()">START BATTLE</button>
  <button class="btn join">JOIN TOURNAMENT</button>

</div>

<script>

/* 🔥 BUTTON SOUND */
const clickSound=new Audio("click.mp3");

document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    clickSound.currentTime=0;
    clickSound.play();
  });
});

/* 🔥 NAVIGATION */
function startGame(){
  setTimeout(()=>{
    window.location.href="game.html";
  },200);
}

/* 🔥 PARTICLES */
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}

/* 🔥 LIGHT PARALLAX (3D FEEL) */
document.addEventListener("mousemove",(e)=>{
  let x=e.pageX/50;
  let y=e.pageY/50;

  document.querySelector(".bg").style.transform=
    `scale(1.05) translate(-${x}px,-${y}px)`;
});

</script>

</body>
</html>
