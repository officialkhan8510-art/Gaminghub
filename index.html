<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Zone - Ultimate Gaming Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Courier New', monospace;
            background: 
                /* Gaming Grid */
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%),
                /* Matrix Effect */
                linear-gradient(90deg, transparent 98%, rgba(0,255,136,0.1) 100%),
                linear-gradient(0deg, transparent 98%, rgba(0,255,136,0.1) 100%),
                /* Dark Gaming Base */
                linear-gradient(45deg, #0a0a23, #1a0033, #000428, #0f0f23);
            background-size: 100px 100px, 100px 100px, 200px 200px, 50px 50px, 50px 50px, 400% 400%;
            animation: gamingBg 10s ease infinite, matrixFlow 20s linear infinite;
            position: relative;
        }

        @keyframes gamingBg {
            0%, 100% { background-position: 0% 50%, 0% 0%, 0% 0%, 0% 0%, 0% 0%, 0% 50%; }
            50% { background-position: 100% 50%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 50%; }
        }

        @keyframes matrixFlow {
            0% { background-position: 0% 0%, 0% 100%; }
            100% { background-position: 100% 0%, 100% 100%; }
        }

        /* Gaming Particles */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        /* GAMER ZONE Logo */
        .logo-container {
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(50px);
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Logo Icon */
        .logo-icon {
            width: clamp(120px, 25vw, 200px);
            height: clamp(120px, 25vw, 200px);
            background: 
                conic-gradient(from 0deg, #ff0040, #ffaa00, #ffff00, #00ff88, #00ccff, #ff00ff, #ff0040);
            border-radius: 50%;
            position: relative;
            margin-bottom: 1rem;
            animation: logoSpin 4s linear infinite, logoPulse 2s ease-in-out infinite alternate;
            box-shadow: 
                0 0 50px rgba(255,0,64,0.6),
                0 0 100px rgba(0,255,136,0.4),
                inset 0 0 50px rgba(255,255,255,0.1);
        }

        .logo-icon::before {
            content: '🎮';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(3rem, 8vw, 6rem);
            filter: drop-shadow(0 0 20px #fff);
            z-index: 2;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            right: 20%;
            bottom: 20%;
            background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
            border-radius: 50%;
            animation: innerGlow 3s ease-in-out infinite alternate;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes logoPulse {
            0% { box-shadow: 0 0 50px rgba(255,0,64,0.6), 0 0 100px rgba(0,255,136,0.4); }
            100% { box-shadow: 0 0 70px rgba(255,0,64,0.8), 0 0 120px rgba(0,255,136,0.6); }
        }

        @keyframes innerGlow {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* GAMER ZONE Text */
        .logo-text {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 25%, #ff00ff 50%, #ffaa00 75%, #00ff88 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 40px #00ff88,
                0 0 80px #00ccff,
                0 0 120px #ff00ff;
            animation: textGlow 2.5s ease-in-out infinite alternate;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .logo-text span {
            display: block;
            font-size: 0.6em;
            letter-spacing: 2px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-top: 0.5rem;
        }

        @keyframes textGlow {
            0% { filter: brightness(1) drop-shadow(0 0 20px #00ff88); }
            100% { filter: brightness(1.4) drop-shadow(0 0 40px #ff00ff); }
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(1.3rem, 4vw, 2.8rem);
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88;
            margin-bottom: 4rem;
            animation: subtitleFloat 3s ease-in-out infinite;
            opacity: 0;
            transform: translateY(30px);
            font-weight: bold;
        }

        @keyframes subtitleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 2.5rem;
            opacity: 0;
            transform: translateY(30px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 20px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-decoration: none;
            display: inline-block;
            overflow: hidden;
            min-width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.7s;
        }

        .btn:hover::before { left: 100%; }

        .login-btn {
            background: linear-gradient(145deg, #ff0040, #ff4080, #ff0066);
            color: white;
            box-shadow: 0 15px 40px rgba(255,0,64,0.5);
        }

        .login-btn:hover {
            transform: translateY(-15px) rotateX(15deg);
            box-shadow: 0 30px 60px rgba(255,0,64,0.7);
        }

        .play-btn {
            background: linear-gradient(145deg, #00ff88, #40ffaa, #00cc66);
            color: #000;
            box-shadow: 0 15px 40px rgba(0,255,136,0.5);
            font-weight: 900;
        }

        .play-btn:hover {
            transform: translateY(-15px) rotateX(15deg) scale(1.08);
            box-shadow: 0 35px 70px rgba(0,255,136,0.8);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .btn-group { gap: 2rem; }
            .btn { padding: 18px 35px; font-size: 1.2rem; min-width: 200px; }
        }

        @media (max-width: 480px) {
            .btn-group { flex-direction: column; gap: 1.5rem; }
            .btn { min-width: 250px; padding: 16px 30px; }
        }
    </style>
</head>
<body>
    <!-- Gaming Particles -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Main Content -->
    <div class="container">
        <div class="logo-container">
            <div class="logo">
                <div class="logo-icon"></div>
                <div class="logo-text">
                    GAMER ZONE
                    <span>Play • Win • Dominate</span>
                </div>
            </div>
        </div>
        <p class="subtitle">Join the Ultimate Gaming Revolution</p>
        <div class="btn-group">
            <a href="#login" class="btn login-btn">LOGIN</a>
            <a href="#play" class="btn play-btn">PLAY NOW</a>
        </div>
    </div>

    <script>
        // Advanced Gaming Particles
        class GamingParticles {
            constructor() {
                this.canvas = document.getElementById('particlesCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                this.particles = [];
                this.mouseX = 0;
                this.mouseY = 0;
                this.init();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            init() {
                for (let i = 0; i < 100; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2 + 1,
                        opacity: Math.random() * 0.6 + 0.2,
                        hue: Math.random() * 60 + 180, // Gaming colors
                        life: 1
                    });
                }
                this.animate();
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.particles.forEach(p => {
                    // Mouse attraction
                    const dx = this.mouseX - p.x;
                    const dy = this.mouseY - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        p.vx += dx * 0.01;
                        p.vy += dy * 0.01;
                    }

                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.002;

                    // Wrap around
                    if (p.x < 0) p.x = this.canvas.width;
                    if (p.x > this.canvas.width) p.x = 0;
                    if (p.y < 0) p.y = this.canvas.height;
                    if (p.y > this.canvas.height) p.y = 0;

                    // Draw particle
                    this.ctx.save();
                    this.ctx.globalAlpha = p.opacity * p.life;
                    this.ctx.fillStyle = `hsl(${p.hue}, 100%, ${50 + p.life * 30}%)`;
                    this.ctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
                    this.ctx.shadowBlur = 15;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.restore();
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        // Entrance Animation
        function entranceAnimation() {
            const timeline = [
                { selector: '.logo-container', delay: 300 },
                { selector: '.subtitle', delay: 1000 },
                { selector: '.btn-group', delay: 1800 }
            ];

            timeline.forEach(({ selector, delay }) => {
                setTimeout(() => {
                    const el = document.querySelector(selector);
                    el.style.transition = 'all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, delay);
            });
        }

        // Button Effects
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Explosive effect
                btn.style.transform = 'scale(0.95)';
                document.body.style.filter = 'brightness(1.3)';
                
                setTimeout(() => {
                    btn.style.transform = '';
                    document.body.style.filter = '';
                }, 200);

                // Action feedback
                setTimeout(() => {
                    if (btn.classList.contains('login-btn')) {
                        alert('🔐 Welcome back, Gamer!\nLogin to access your profile!');
                    } else {
                        alert('🎮 GAME ON!\nEntering Gamer Zone...');
                        document.body.style.animation = 'none';
                        setTimeout(() => {
                            document.body.style.animation = '';
                        }, 100);
                    }
                }, 300);
            });

            // Hover sound effect (visual)
            btn.addEventListener('mouseenter', () => {
                btn.style.filter = 'brightness(1.2)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.filter = '';
            });
        });

        // Mouse tracking for particles
        document.addEventListener('mousemove', (e) => {
            particlesSystem.mouseX = e.clientX;
            particlesSystem.mouseY = e.clientY;
        });

        // Initialize
        let particlesSystem;
        window.addEventListener('load', () => {
            particlesSystem = new GamingParticles();
            entranceAnimation();
        });

        window.addEventListener('resize', () => {
            if (particlesSystem) particlesSystem.resize();
        });
    </script>
</body>
</html>
